<!DOCTYPE html>
<html>
<head>
  <title>Process Logo</title>
</head>
<body>
  <h1>Processing Logo... Please copy the Base64 output below</h1>
  <img id="logo" src="Gemini_Generated_Image_mm0n9tmm0n9tmm0n.png" style="max-width: 300px;" />
  <canvas id="canvas" style="display: none;"></canvas>
  <textarea id="output" style="width: 100%; height: 300px; font-family: monospace;"></textarea>

  <script>
    const img = document.getElementById('logo');
    img.onload = function() {
      const canvas = document.getElementById('canvas');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);

      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imgData.data;

      for (let i = 0; i < data.length; i += 4) {
        const r = data[i];
        const g = data[i+1];
        const b = data[i+2];
        
        const maxVal = Math.max(r, g, b);
        const minVal = Math.min(r, g, b);
        const diff = maxVal - minVal;

        // Filter out grey/white checkerboard pattern and whites
        if ((diff < 35 && maxVal > 110) || (r > 220 && g > 220 && b > 220)) {
          data[i+3] = 0; // Alpha transparent
        }
      }

      ctx.putImageData(imgData, 0, 0);
      document.getElementById('output').value = canvas.toDataURL("image/png");
    };
    if (img.complete) {
      img.onload();
    }
  </script>
</body>
</html>
