<!DOCTYPE html>
<html>
<head>
  <title>Process Logo</title>
</head>
<body>
  <img id="logo" src="mentR_Logo.png" style="display: none;" />
  <canvas id="canvas" style="display: none;"></canvas>
  <textarea id="output" style="width: 100%; height: 300px;"></textarea>

  <script>
    const img = document.getElementById('logo');
    img.onload = function() {
      const canvas = document.getElementById('canvas');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);

      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imgData.data;

      for (let i = 0; i < data.length; i += 4) {
        const r = data[i];
        const g = data[i+1];
        const b = data[i+2];
        // If the pixel is close to white, make it transparent
        if (r > 230 && g > 230 && b > 230) {
          data[i+3] = 0; // Alpha
        }
      }

      ctx.putImageData(imgData, 0, 0);
      document.getElementById('output').value = canvas.toDataURL("image/png");
    };
    // Trigger onload if image is cached
    if (img.complete) {
      img.onload();
    }
  </script>
</body>
</html>
